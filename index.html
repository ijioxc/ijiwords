<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ijiWords</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid #e5e7eb;
      padding: 0 48px;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center;
      height: 64px; gap: 10px;
    }
    .logo { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: #1e3a5f; }
    .logo span { font-weight: 300; }

    main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding: 64px 48px 80px;
    }

    .hero {
      margin-bottom: 56px;
    }
    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    .hero-title {
      font-size: 36px;
      font-weight: 600;
      color: #111;
      line-height: 1.25;
      margin-bottom: 14px;
    }
    .hero-sub {
      font-size: 16px;
      color: #6b7280;
      line-height: 1.6;
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      cursor: pointer;
    }
    .card:hover {
      border-color: #1e3a5f;
      box-shadow: 0 4px 24px rgba(30,58,95,.08);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }
    .card-icon.blue  { background: #eef3f9; }
    .card-icon.amber { background: #fffbeb; }
    .card-icon.green { background: #f0fdf4; }

    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .1em;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.65;
      flex: 1;
    }

    .card-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 20px;
    }
    .chip {
      font-size: 12px;
      background: #f3f4f6;
      color: #374151;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .card-arrow {
      margin-top: 20px;
      font-size: 13px;
      color: #1e3a5f;
      font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }

    footer {
      border-top: 1px solid #f3f4f6;
      padding: 20px 48px;
      text-align: center;
      font-size: 12px;
      color: #d1d5db;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">iji<span>Words</span></span>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-label">英文學習工具</div>
    <div class="hero-title">選擇你要用的工具</div>
    <div class="hero-sub">期末整理 · 聽力劇情 · 單字記錄</div>
  </div>

  <div class="cards">

    <!-- 期末整理 -->
    <a class="card" href="期末整理.html">
      <div class="card-icon blue">📋</div>
      <div class="card-tag">期末考重點</div>
      <div class="card-title">期末整理</div>
      <div class="card-desc">單字表、文法表、聽力題、片語整理，依主題分類，一目了然。</div>
      <div class="card-chips">
        <span class="chip">單字 70+</span>
        <span class="chip">文法 2 大項</span>
        <span class="chip">聽力題</span>
        <span class="chip">片語</span>
      </div>
      <div class="card-arrow">開啟 →</div>
    </a>

    <!-- 聽力劇情 -->
    <a class="card" href="聽力劇情.html">
      <div class="card-icon amber">🎧</div>
      <div class="card-tag">選擇題重點</div>
      <div class="card-title">聽力劇情整理</div>
      <div class="card-desc">每段聽力的完整故事、常考細節、關鍵對話原文，搭配模擬選擇題。</div>
      <div class="card-chips">
        <span class="chip">Jim &amp; Liz 借錢</span>
        <span class="chip">珠寶店詐騙</span>
        <span class="chip">咖啡廳扒竊</span>
        <span class="chip">CCTV 記憶</span>
      </div>
      <div class="card-arrow">開啟 →</div>
    </a>

    <!-- 單字 App -->
    <a class="card" href="app.html">
      <div class="card-icon green">✏️</div>
      <div class="card-tag">自由記錄</div>
      <div class="card-title">單字記錄 App</div>
      <div class="card-desc">自行新增單字、設定分類與難度，資料存在瀏覽器本地，可匯出備份。</div>
      <div class="card-chips">
        <span class="chip">新增 / 編輯 / 刪除</span>
        <span class="chip">分類 Tab</span>
        <span class="chip">匯出 JSON</span>
      </div>
      <div class="card-arrow">開啟 →</div>
    </a>

  </div>
</main>

<footer>ijiWords · 英文學習整理</footer>

</body>
</html>
